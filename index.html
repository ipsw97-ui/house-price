<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>전국 매매가격지수</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    margin:40px;
}

h2{
    text-align:center;
}

canvas{
    width:100%;
    max-width:1200px;
    height:600px;
}
</style>

</head>

<body>

<h2>전국 매매가격지수</h2>

<canvas id="chart"></canvas>

<script>

const workerUrl="https://bitter-pine-7fb8.ipsw97.workers.dev/";

fetch(workerUrl)
.then(res=>res.text())

.then(xmlText=>{

    const parser=new DOMParser();

    const xml=parser.parseFromString(xmlText,"text/xml");

    const rows=xml.getElementsByTagName("row");

    const labels=[];
    const values=[];

    for(let i=0;i<rows.length;i++){

        const cls=rows[i]
            .getElementsByTagName("CLS_FULLNM")[0]
            ?.textContent
            ?.trim();

        if(cls!=="전국") continue;

        const date=rows[i]
            .getElementsByTagName("WRTTIME_DESC")[0]
            ?.textContent
            ?.trim();

        const value=parseFloat(
            rows[i]
            .getElementsByTagName("DTA_VAL")[0]
            ?.textContent
        );

        if(isNaN(value)) continue;

        labels.push(date);
        values.push(value);

    }

    console.log(labels);
    console.log(values);

    new Chart(
        document.getElementById("chart"),
        {
            type:"line",
            data:{
                labels:labels,
                datasets:[
                    {
                        label:"전국 매매가격지수",
                        data:values,
                        borderWidth:2,
                        fill:false,
                        tension:0.2
                    }
                ]
            },
            options:{
                responsive:true,
                maintainAspectRatio:false
            }
        }
    );

})
.catch(err=>{

    console.error(err);

    document.body.innerHTML+="<p>데이터를 불러오지 못했습니다.</p>";

});

</script>

</body>
</html>
