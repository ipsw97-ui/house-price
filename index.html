<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>매매가격지수_아파트</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <canvas id="chart"></canvas>

  <script>
    const API_URL = "https://www.reb.or.kr/r-one/portal/stat/sttsDataPreviewList.do";

    const formData = new URLSearchParams({
      statblId: "A_2024_00045",
      statId: "S234820263",
      statTitle: "(월) 매매가격지수_아파트",
      wrttimeStartYear: "2003",
      wrttimeStartQt: "01",
      wrttimeEndYear: "2026",
      wrttimeEndQt: "05",
      dtacycleCd: "MM",
      tabMapVal: "KOREA",
      topCateId: "700000",
      optDivVal: "00",
      chkItms: "100001",
      chkClss: "500001,500002,500003,500008",
      dtadvsVal: "OD,PR",
      callTag: "F",
      returnObjName: "btnRoneItm"
    });

    async function loadData() {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8"
        },
        body: formData
      });

      const json = await res.json();
      const rows = json.DATA;

      const datasets = rows.map(row => {
        const points = [];

        Object.keys(row).forEach(key => {
          const match = key.match(/^COL_(\d{6})100001OD$/);
          if (match) {
            const ym = match[1];
            const year = ym.slice(0, 4);
            const month = ym.slice(4, 6);
            points.push({
              date: `${year}-${month}`,
              value: Number(row[key])
            });
          }
        });

        points.sort((a, b) => a.date.localeCompare(b.date));

        return {
          label: row.CATE1,
          data: points.map(p => p.value),
          dates: points.map(p => p.date),
          fill: false,
          tension: 0.2
        };
      });

      const labels = datasets[0].dates;

      new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
          labels,
          datasets: datasets.map(({ label, data, fill, tension }) => ({
            label,
            data,
            fill,
            tension
          }))
        },
        options: {
          responsive: true,
          plugins: {
            title: {
              display: true,
              text: "매매가격지수_아파트"
            }
          },
          scales: {
            y: {
              title: {
                display: true,
                text: "지수"
              }
            }
          }
        }
      });
    }

    loadData();
  </script>
</body>
</html>
