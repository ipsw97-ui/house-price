<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>매매가격지수_아파트</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { margin: 0; padding: 20px; font-family: sans-serif; }
    .wrap { width: 100%; height: 520px; }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="chart"></canvas>
  </div>

  <script>
    const API_URL = "https://www.reb.or.kr/r-one/portal/stat/sttsDataPreviewList.do";

    const formData = new URLSearchParams({
      statblId: "A_2024_00045",
      statId: "S234820263",
      statTitle: "(월) 매매가격지수_아파트",

      dtacycleCd: "MM",
      wrttimeStartYear: "2017",
      wrttimeStartQt: "06",
      wrttimeEndYear: "2026",
      wrttimeEndQt: "05",

      chartStockType: "HISTORY",
      chart23Type: "2D",
      tabMapVal: "KOREA",
      topCateId: "700000",
      optDivVal: "00",
      optST: "H",
      optSC: "L",
      optSI: "H",
      viewLocOpt: "B",
      wrttimeType: "L",
      wrttimeOrder: "A",
      callTag: "F",
      returnObjName: "btnRoneItm",
      callSheet: "IB8",

      chkItms: "100001",
      chkClss: "500001,500002,500003,500008",
      dtadvsVal: "OD",

      hasClsAllChk: "N",
      hasItmAllChk: "Y",
      hasGrpAllChk: "Y"
    });

    async function loadData() {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8"
        },
        body: formData
      });

      const json = await res.json();
      const rows = json.DATA || [];

      const datasets = rows.map(row => {
        const points = [];

        Object.keys(row).forEach(key => {
          const match = key.match(/^COL_(\d{6})100001OD$/);
          if (!match) return;

          const ym = match[1];
          points.push({
            date: `${ym.slice(0, 4)}-${ym.slice(4, 6)}`,
            value: Number(row[key])
          });
        });

        points.sort((a, b) => a.date.localeCompare(b.date));

        return {
          label: row.CATE1,
          data: points.map(p => p.value),
          dates: points.map(p => p.date),
          fill: false,
          tension: 0.25
        };
      });

      const labels = datasets[0]?.dates || [];

      new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
          labels,
          datasets: datasets.map(d => ({
            label: d.label,
            data: d.data,
            fill: d.fill,
            tension: d.tension
          }))
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            title: {
              display: true,
              text: "매매가격지수_아파트"
            },
            legend: {
              position: "bottom"
            }
          },
          scales: {
            y: {
              title: {
                display: true,
                text: "지수"
              }
            }
          }
        }
      });
    }

    loadData().catch(err => {
      document.body.innerHTML =
        "<p>데이터를 불러오지 못했습니다. CORS 오류일 가능성이 있습니다.</p><pre>" +
        err +
        "</pre>";
    });
  </script>
</body>
</html>
